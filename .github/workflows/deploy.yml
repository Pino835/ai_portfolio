name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./ia_portfolio
        run: npm install

      - name: Build
        working-directory: ./ia_portfolio
        run: npm run build
        env:
          VITE_MAKE_WEBHOOK: ${{ secrets.VITE_MAKE_WEBHOOK }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ia_portfolio/dist
